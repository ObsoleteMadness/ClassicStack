version: "2"

run:
  timeout: 5m
  build-tags:
    - all

linters:
  default: none
  enable:
    - errcheck
    - errorlint
    - gocritic
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
  settings:
    errorlint:
      errorf: true
      asserts: true
      comparison: true
    revive:
      rules:
        - name: var-naming
        - name: package-comments
        - name: exported
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - errcheck
          - revive
